version: '3'

services:
  web:
    build: web
    depends_on:
      - db
    container_name: misp_web
    image: aajarvis/misp:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /dev/urandom:/dev/random
      - /home/alex/kube-docker/data/web:/var/www/MISP
    environment:
      - MYSQL_HOST=misp_db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp
      - MYSQL_ROOT_PASSWORD=misp

      - MISP_ADMIN_EMAIL=admin@admin.test
      - MISP_ADMIN_PASSPHRASE=admin
      - MISP_BASEURL=https://10.0.0.0

      - POSTFIX_RELAY_HOST=relay.fqdn
      - TIMEZONE=Europe/London
    entrypoint: "wait-for-it.sh -t 0 -h 10.0.0.0 -p 3306 -- /run.sh"

  db:
    container_name: misp_db
    image: mysql/mysql-server:5.7
    hostname: misp_db
    restart: unless-stopped
    volumes:
      - /home/alex/kube-docker/data/db:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp
      - MYSQL_ROOT_PASSWORD=misp
    ports:
      - "3306:3306"
